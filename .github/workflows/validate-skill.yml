name: Validate Skill

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check SKILL.md exists and has frontmatter
        run: |
          if [ ! -f SKILL.md ]; then
            echo "ERROR: SKILL.md not found"
            exit 1
          fi
          if ! head -1 SKILL.md | grep -q "^---"; then
            echo "ERROR: SKILL.md missing YAML frontmatter"
            exit 1
          fi
          echo "SKILL.md validation passed"

      - name: Check required files exist
        run: |
          files=("schema.sql" "scripts/schema.sql" "scripts/mem.py" "README.md" "LICENSE" "CHANGELOG.md" "INSTALL.md")
          for f in "${files[@]}"; do
            if [ ! -f "$f" ]; then
              echo "ERROR: Required file missing: $f"
              exit 1
            fi
          done
          echo "All required files present"

      - name: Install Python dependencies
        run: pip install requests

      - name: Validate Python syntax
        run: |
          python3 -m py_compile mem.py
          python3 -m py_compile scripts/mem.py
          python3 -m py_compile scripts/verify.py
          python3 -m py_compile tests/test_connection.py
          python3 -m py_compile tests/test_storage.py
          python3 -m py_compile tests/test_search.py
          echo "Python syntax OK"

      - name: Validate mem.py imports requests
        run: |
          if ! grep -q "import requests" scripts/mem.py; then
            echo "ERROR: mem.py must import requests for Supabase REST access"
            exit 1
          fi
          echo "requests import verified"

      - name: Validate schema.sql is PostgreSQL
        run: |
          if grep -q "PRAGMA\|fts5\|sqlite" schema.sql; then
            echo "ERROR: schema.sql appears to contain SQLite syntax, not PostgreSQL"
            exit 1
          fi
          if ! grep -q "gen_random_uuid\|TIMESTAMPTZ\|TSVECTOR" schema.sql; then
            echo "ERROR: schema.sql missing expected PostgreSQL constructs"
            exit 1
          fi
          echo "schema.sql PostgreSQL validation passed"

      - name: Check SKILL.md size
        run: |
          words=$(wc -w < SKILL.md)
          echo "SKILL.md: $words words"
          if [ "$words" -gt 6000 ]; then
            echo "WARNING: SKILL.md is large ($words words). Consider splitting."
          fi
